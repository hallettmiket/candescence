
# Candescence conda environment
# Install with: conda env create -f environment.yml
# Activate with: conda activate candescence_new

name: candescence_new
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  # Python
  - python=3.10

  # PyTorch with CUDA support
  - pytorch>=2.0.0
  - torchvision>=0.15.0
  - torchaudio>=2.0.0
  - pytorch-cuda=11.8

  # Scientific computing
  - numpy>=1.24.0
  - scipy>=1.10.0
  - pandas>=2.0.0
  - scikit-learn>=1.2.0

  # Visualization
  - matplotlib>=3.7.0
  - seaborn>=0.12.0
  - plotly>=5.18.0

  # Web app
  - streamlit>=1.30.0

  # TOML config-file parsing (stdlib tomllib is used on Python 3.11+)
  - tomli>=2.0.0

  # Metrics
  - torchmetrics>=1.0.0

  # Image processing
  - pillow>=9.0.0
  - scikit-image>=0.21.0
  - opencv>=4.7.0

  # Jupyter
  - jupyterlab>=4.0.0
  - ipywidgets>=8.0.0

  # Data formats
  - openpyxl>=3.1.0
  - h5py>=3.8.0

  # Development tools
  - pytest>=7.0.0
  - black>=23.0.0
  - isort>=5.12.0

  # Pip packages
  - pip
  - pip:
    # Perceptual losses
    - lpips>=0.1.4
    - piqa>=1.3.0

    # Advanced analysis (optional, but needed for full functionality)
    - umap-learn>=0.5.0
    - hdbscan>=0.8.0
    - python-igraph>=0.10.0
    - leidenalg>=0.9.0

    # Install candescence in editable mode
    - -e .
